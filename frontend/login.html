<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng nhập - Smart Loan Advisor">
    <title>Đăng nhập - Smart Loan Advisor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="bg-pattern"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="login-logo">🏦</span>
                <h2>Smart Loan Advisor</h2>
                <p>Hệ thống tư vấn gói vay thông minh</p>
            </div>
            
            <div id="login-error"></div>
            
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg login-btn" id="loginBtn">
                    Đăng nhập
                </button>
            </form>
            
            <div style="margin-top: 24px; text-align: center; font-size: 13px; color: var(--text-muted);">
                <p>Gợi ý tài khoản demo:</p>
                <p>Quản lý: <b>manager / manager123</b></p>
                <p>Nhân viên: <b>staff / staff123</b></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:3000/api/v1";

        async function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorDiv = document.getElementById('login-error');
            const loginBtn = document.getElementById('loginBtn');
            const originalBtnText = loginBtn.innerHTML;

            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="spinner"></div> Đang đăng nhập...';

            try {
                const formData = new URLSearchParams();
                formData.append('username', usernameInput.value);
                formData.append('password', passwordInput.value);

                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('sla_token', data.access_token);
                    localStorage.setItem('sla_user_role', data.role);
                    localStorage.setItem('sla_user_name', data.full_name);
                    
                    if (data.role === 'staff') {
                        localStorage.setItem('sla_start_page', 'predict');
                    } else {
                        localStorage.setItem('sla_start_page', 'dashboard');
                    }
                    
                    window.location.href = 'index.html';
                } else {
                    errorDiv.innerHTML = data.detail || 'Đăng nhập thất bại';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerHTML = 'Không thể kết nối tới server';
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalBtnText;
            }
        }

        if (localStorage.getItem('sla_token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
